<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contacto | BLIX</title>
  <link rel="stylesheet" href="../CSS/contacto_style.css" />
  <link rel="stylesheet" href="../CSS/index_style.css" />
</head>
<script src="../JS/contacto.js"></script>
<body>
  <header class="nav">
    <div class="container nav-inner">
      <a href="index.html" class="brand">
        <img src="../IMGS/logo.jpeg" alt="BLIX logo" class="logo">
      </a>
      <a class="btn btn-secondary" href="../index.html">Volver</a>
    </div>
  </header>

  <main class="contact-page">
    <section class="contact-section">
      <div class="container">
        <div class="contact-card">
          <p class="contact-eyebrow">CONTACTO</p>
          <h1>Cuéntame tu proyecto</h1>
          <p class="contact-text">
            Rellena este formulario y te responderé en cuanto pueda para hablar sobre tu web.
          </p>

          <form
            action="https://formspree.io/f/xojknykv"
            method="POST"
            class="contact-form"
          >
            <div class="form-group">
              <label for="name">Nombre</label>
              <input type="text" id="name" name="name" required>
            </div>

            <div class="form-group">
              <label for="email">Correo Electrónico</label>
              <input type="email" id="email" name="email" required>
            </div>

            <div class="form-group">
              <label for="business">Nombre del Negocio</label>
              <input type="text" id="business" name="business">
            </div>

            <div class="form-group">
            <label for="businessType">Tipo de negocio</label>

            <select id="businessType" name="businessType" required>
                <option value="" disabled selected>Seleccione una opción</option>

                <option value="Restaurante / bar">Restaurante / Bar</option>
                <option value="Tienda">Tienda</option>
                <option value="Gimnasio / deporte">Gimnasio / Centro deportivo</option>
                <option value="Servicios profesionales">Servicios profesionales</option>
                <option value="Marca personal">Marca personal</option>
                <option value="Otro">Otro</option>
            </select>
            </div>

            <div class="form-group" id="otroNegocioContainer" style="display:none;">
            <label for="otroNegocio">Describe tu negocio</label>
            <input type="text" id="otroNegocio" name="otroNegocio" placeholder="Ej: clínica dental, inmobiliaria...">
            </div>

            <div class="form-group">
            <label for="budget">Presupuesto aproximado</label>
            <select id="budget" name="budget">
                <option value="" disabled selected>Seleccione una opción</option>
                <option value="Menos de 300€">Menos de 300€</option>
                <option value="300€ - 600€">300€ - 500€</option>
                <option value="600€ - 1000€">500€ - 800€</option>
                <option value="Más de 1000€">Más de 800€</option>
            </select>
            </div>

            <div class="form-group">
              <label for="message">Qué necesitas</label>
              <textarea id="message" name="message" rows="6" required></textarea>
            </div>

            <button type="submit" class="btn btn-primary">Enviar formulario</button>
          </form>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
